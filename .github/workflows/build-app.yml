name: Build macOS .app + DMG

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Attach artifacts to this existing release tag (e.g. v0.5.0). Leave empty to upload as workflow artifact only.'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build:
    name: Build on Apple Silicon
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: 'uv.lock'

      - name: Pin Python 3.12
        run: uv python install 3.12

      - name: Sync dependencies (dev only — keep `ocr` extra out of bundle)
        run: uv sync --extra dev

      - name: Compute release tag
        id: ver
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          elif [[ -n "${{ inputs.release_tag }}" ]]; then
            echo "tag=${{ inputs.release_tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=manual-${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build .app via PyInstaller
        run: ./scripts/build_app.sh

      - name: Compress .app (ditto preserves macOS metadata)
        run: |
          set -euo pipefail
          cd dist
          ZIP_NAME="Lexisub-${{ steps.ver.outputs.tag }}-macos-arm64.zip"
          ditto -c -k --keepParent --sequesterRsrc Lexisub.app "$ZIP_NAME"
          cp ../USER_GUIDE.ko.md .

      - name: Build DMG (drag-and-drop installer)
        run: |
          set -euo pipefail
          STAGING="dist/dmg-staging"
          rm -rf "$STAGING"
          mkdir -p "$STAGING"
          # macOS-standard layout: app + Applications symlink + a tiny
          # plain-text first-run note. Full user guide lives on GitHub
          # so it's always up-to-date with the latest release.
          cp -R dist/Lexisub.app "$STAGING/Lexisub.app"
          cat > "$STAGING/처음 실행하는 법.txt" <<'EOF'
          Lexisub 처음 실행하는 법
          ─────────────────────────────────

          1. 왼쪽의 [Lexisub] 아이콘을
             오른쪽 [Applications] 폴더로 끌어다 놓으세요.

          2. Finder의 응용 프로그램 폴더에서 Lexisub을 찾으세요.

          3. 처음 한 번만:
             Lexisub 아이콘을 우클릭(Control+클릭) → "열기"를 누르세요.
             ("확인되지 않은 개발자" 경고 → "열기" 한 번 누르면 됩니다.)

          4. 처음 영상을 처리하면 약 4GB의 AI 모델을 자동으로
             다운로드합니다(한 번만). 이후엔 즉시 동작합니다.

          ─────────────────────────────────

          📖 자세한 사용 설명서 (한국어, 항상 최신):
          https://github.com/existmaster/lexisub/blob/main/USER_GUIDE.ko.md

          앱을 실행한 뒤 메뉴바 [도움말] → [사용 설명서]를
          클릭해도 위 페이지가 브라우저로 열립니다.

          ─────────────────────────────────

          문제가 있으면:
          https://github.com/existmaster/lexisub/issues

          EOF
          ln -s /Applications "$STAGING/Applications"
          DMG_NAME="Lexisub-${{ steps.ver.outputs.tag }}-macos-arm64.dmg"
          hdiutil create \
            -volname "Lexisub ${{ steps.ver.outputs.tag }}" \
            -srcfolder "$STAGING" \
            -ov -format UDZO \
            "dist/$DMG_NAME"
          ls -lh "dist/$DMG_NAME"

      - name: Upload as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: Lexisub-${{ steps.ver.outputs.tag }}-macos-arm64
          path: |
            dist/Lexisub-*.zip
            dist/Lexisub-*.dmg
            dist/USER_GUIDE.ko.md
          if-no-files-found: error

      - name: Attach to GitHub Release
        if: github.event_name == 'push' || inputs.release_tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          files: |
            dist/Lexisub-*.zip
            dist/Lexisub-*.dmg
            dist/USER_GUIDE.ko.md
          fail_on_unmatched_files: true
